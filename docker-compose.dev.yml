version: '3.8'

services:
  web:
    build: .
    container_name: fastapi-dev
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite:///./app.db
      - DEBUG=True
    volumes:
      - .:/app  # Монтируем код для live reload
      - ./app.db:/app/app.db
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload