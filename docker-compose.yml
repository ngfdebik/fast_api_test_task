version: '3.8'

services:
  web:
    build: .
    container_name: fastapi-app
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite:///./app.db
      - DEBUG=True
    volumes:
      - ./app.db:/app/app.db
      - ./logs:/app/logs
    restart: unless-stopped

